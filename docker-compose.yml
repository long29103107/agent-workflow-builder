services:
  backend:
    build:
      context: .
      dockerfile: src/AgentWorkflow.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Neo4j__Uri: bolt://neo4j:7687
      Qdrant__Endpoint: http://qdrant:6333
      Postgres__ConnectionString: Host=postgres;Port=5432;Database=agent_workflows;Username=agent;Password=agent
      AGENT_WORKFLOW_REPOSITORY_PATH: /workspace
    ports:
      - "5086:8080"
    volumes:
      - .:/workspace:ro
    depends_on:
      - neo4j
      - qdrant
      - postgres

  frontend:
    build:
      context: .
      dockerfile: src/agent-workflow-ui/Dockerfile
    environment:
      VITE_API_BASE_URL: http://localhost:5086/api
    ports:
      - "5173:5173"
    depends_on:
      - backend

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/agentworkflow
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data

  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agent_workflows
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agent
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  neo4j-data:
  qdrant-data:
  postgres-data:
