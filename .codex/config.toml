[project]
name = "agent-workflow-builder"
description = "Runnable MVP for a Lead Agent orchestrating replaceable specialist agents."

[defaults]
primary_prompt = ".codex/prompts/implement-task.md"
review_prompt = ".codex/prompts/review.md"

[workflow]
knowledge = "docs/knowledge/index.md"
phases = "docs/knowledge/phases"
memory_index = ".codegraph"
memory_provider = "codegraph"
task_id_format = "PPP_TTT"

[agents.lead]
description = "Task intake and specialist routing"
prompt = ".codex/agents/lead-task-agent.md"

[agents.backend]
description = "Core and backend implementation"
prompt = ".codex/agents/backend-agent.md"

[agents.frontend]
description = "Bun and React UI implementation"
prompt = ".codex/agents/frontend-agent.md"

[agents.repository]
description = "Repository context and file discovery"
prompt = ".codex/agents/repository-investigator-agent.md"

[agents.core]
description = "AgentWorkflow.Core source-of-truth changes"
prompt = ".codex/agents/core-platform-agent.md"

[agents.docs]
description = "Documentation and Codex operating assets"
prompt = ".codex/agents/docs-agent.md"

[agents.qa]
description = "Verification and smoke-test strategy"
prompt = ".codex/agents/qa-agent.md"