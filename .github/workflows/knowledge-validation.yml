name: Validate knowledge and skills

on:
  pull_request:
    paths:
      - ".codex/**"
      - "docs/knowledge/**"
      - "scripts/validate-phase-knowledge.ps1"
      - "scripts/validate-skills.py"
      - "requirements-dev.txt"
      - ".github/workflows/knowledge-validation.yml"
  push:
    branches: ["main"]
    paths:
      - ".codex/**"
      - "docs/knowledge/**"
      - "scripts/validate-phase-knowledge.ps1"
      - "scripts/validate-skills.py"
      - "requirements-dev.txt"
      - ".github/workflows/knowledge-validation.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - name: Install validator dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Validate phase knowledge
        shell: pwsh
        run: ./scripts/validate-phase-knowledge.ps1
      - name: Validate repo-local skills
        run: python scripts/validate-skills.py
